<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>주문 결제 페이지</title>
<link rel="stylesheet" type="text/css" href="/css/styles.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.iamport.kr/js/iamport.payment-1.1.5.js"></script>
<!-- jQuery -->
<script type="text/javascript"
	src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
<!-- iamport.payment.js -->
<script type="text/javascript"
	src="https://cdn.iamport.kr/js/iamport.payment-{SDK-최신버전}.js"></script>
<style>
body {
	background-color: #FFFFFF;
	font-family: Arial, sans-serif;
	margin: 0;
	padding: 0;
}

.container {
	max-width: 800px;
	margin: 0 auto;
	padding: 20px;
}

h1 {
	text-align: center;
	font-weight: 350;
	font-size: 36px;
}

.navigation {
	text-align: center;
	font-size: 12px;
	color: gray;
	margin: 10px 0;
}

.section {
	border-top: 2px solid black;
	border-bottom: 2px solid black;
	padding: 15px;
	margin: 20px 0;
}

h2 {
	margin-bottom: 10px;
	color: black;
	font-weight: 150;
}

table {
	width: 100%;
	border-collapse: collapse;
	margin-top: 10px;
	table-layout: auto; /* 열 너비 자동 조정 */
}

th, td {
	text-align: left;
	padding: 10px; /* 패딩 증가 */
	border: 1px solid #ccc; /* 테두리 추가 */
	word-wrap: break-word; /* 긴 텍스트 줄 바꿈 허용 */
}

#paymentButton {
	display: block;
	margin: 30px auto;
	padding: 10px 20px;
	font-size: 16px;
	background-color: blue;
	color: white;
	border: none;
	border-radius: 5px;
	cursor: pointer;
}

#paymentButton:hover {
	background-color: darkblue;
}

.small-text {
	font-size: 12px; /* 글씨 크기 */
	color: gray; /* 글씨 색상 */
}

.section {
	overflow-y: auto; /* 세로 스크롤 가능 */
	max-height: 300px; /* 최대 높이 설정 */
}
</style>
</head>
<body>

	<div class="container">
		<h1>주문/결제</h1>

		<div class="navigation">
			쇼핑백 > <span style="color: black;">주문결제</span> > 주문완료
		</div>

		<h2>배송지 정보</h2>
		<div class="section">
			<p>
				이름: <span th:text="${user != null ? user.name : '홍길동'}">홍길동</span>
				우편번호: <span th:text="${user != null ? user.zipcode : '01000'}">01000</span>
				주소: <span
					th:text="${user != null ? user.addr : '서울특별시 강남구 테헤란로 123'}">서울특별시
					강남구 테헤란로 123</span> 상세 주소: <span
					th:text="${user != null ? user.addr_detail : '1층'}">1층</span> 전화번호:
				<span th:text="${user != null ? user.phone : '010-1234-5678'}">010-1234-5678</span>
			</p>
			<p>
				배송 요청사항: <select id="ordermemo" name="ordermemo"
					onchange="showInputField(this)">
					<option value="">배송 요청 사항을 선택해 주세요.</option>
					<option value="1">부재 시 경비실에 맡겨주세요.</option>
					<option value="2">부재 시 전화 또는 문자 주세요.</option>
					<option value="3">배송 전 연락주세요.</option>
					<option value="4">택배함에 넣어주세요.</option>
					<option value="5">파손위험 상품.배송 주의해주세요.</option>
					<option value="6">직접입력</option>
				</select> <input type="text" id="customOrderMemo" name="customOrderMemo"
					placeholder="내용을 입력해주세요. (20자 이내)" maxlength="20"
					style="display: none;">
			</p>
			<hr>
		</div>

		<h2>주문 상품 목록</h2>
		<div class="section">
			<table>
				<thead>
					<tr>
						<th>상품정보</th>
						<th>수량</th>
						<th>가격</th>
						<th>총 상품 금액</th>
						<th>배송비</th>
					</tr>
				</thead>
				<tbody>
					<!-- 예시 데이터: 임의의 주문 상품 목록 -->
					<tr>
						<td th:text="'상품 A'">상품 A</td>
						<td th:text="'2'">2</td>
						<td th:text="'₩10,000'">₩10,000</td>
						<td th:text="'₩20,000'">₩20,000</td>
						<td th:text="'₩3,000'">₩3,000</td>
					</tr>
					<tr>
						<td th:text="'상품 B'">상품 B</td>
						<td th:text="'1'">1</td>
						<td th:text="'₩15,000'">₩15,000</td>
						<td th:text="'₩15,000'">₩15,000</td>
						<td th:text="'₩3,000'">₩3,000</td>
					</tr>
					<tr th:if="${#lists.isEmpty(orders)}">
						<td colspan="5">주문이 없습니다.</td>
					</tr>
				</tbody>
			</table>
			<hr>
			<p class="small-text">* 제주/도서산간 지역의 경우 추가 배송비가 발생할 수 있습니다.</p>
		</div>

		<!-- 할인 섹션 -->
		<h2>할인</h2>
		<div class="section">
			<p>
				쿠폰 적용: <input type="text" id="couponCode"
					placeholder="쿠폰 코드를 입력하세요.">
			</p>
			<p>
				적용된 할인 금액: <span id="discountAmount">0원</span>
			</p>
			<hr>
		</div>

		<!-- 결제수단 섹션 -->
		<h2>결제수단</h2>
		<div class="section">
			<p>
				<input type="radio" id="card" name="paymentMethod" value="card"
					checked> <label for="card">신용카드</label>
			</p>
			<p>
				<input type="radio" id="bank" name="paymentMethod" value="bank">
				<label for="bank">무통장 입금</label>
			</p>
			<p>
				<input type="radio" id="kakaopay" name="paymentMethod"
					value="kakaopay"> <label for="kakaopay">카카오페이</label>
			</p>
			<hr>
		</div>

		<button id="paymentButton" onclick="requestPayment()">결제하기</button>
	</div>

	<script>
		function showInputField(select) {
			const inputField = document.getElementById('customOrderMemo');
			if (select.value === "6") { // '직접입력'이 선택되었을 때
				inputField.style.display = 'block';
				inputField.placeholder = '내용을 입력해주세요.'; // 플레이스홀더 텍스트 설정
			} else {
				inputField.style.display = 'none';
			}
		}

		function requestPayment() {
		    const IMP = window.IMP;
		    IMP.init('imp13623334'); // 가맹점 키로 초기화

		    IMP.request_pay({
		        pg: 'nice', // 'nice'로 변경
		        pay_method: 'card',
		        merchant_uid: `mid_${new Date().getTime()}`, // 고유 거래 ID
		        name: '테스트 상품명', // 실제 상품명으로 변경
		        amount: 10000, // 실제 금액으로 설정 (예: 10000원)
		        buyer_email: 'buyer@example.com', // 구매자 이메일
		        buyer_name: '홍길동', // 구매자 이름
		        buyer_tel: '010-1234-5678', // 구매자 전화번호
		        buyer_addr: '서울특별시 강남구 테헤란로 123', // 구매자 주소
		        buyer_postcode: '12345' // 구매자 우편번호
		    }, function(response) {
		        if (response.success) {
		            alert("결제 완료! 고유번호: " + response.imp_uid);
		            window.location.href = 'orderComplete.html'; // 결제 후 이동할 페이지
		        } else {
		            alert("결제 실패: " + response.error_msg);
		        }
		    });
		}

	</script>
</body>
</html>
